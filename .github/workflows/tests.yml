name: CI
on:
    push:
        branches: ["main"]
    pull_request:
    jobs:
        test:
            runs-on: ubuntu-latest
            steps:
                - name: Checkout
                  uses: actions/checkout@v4
                - name: Configuración Python
                  uses: actions/setup-python@v5
                  with:
                      python-version: "3.10"
                - name: Instalación de dependencias
                  run: pip install -r requirements.txt
                - name: Ejecución de tests
                  run: pytest
